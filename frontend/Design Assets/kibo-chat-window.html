
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBO Chat Window Prototype</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <style>
        :root {
            /* Warm & Soft Palette (OKLch) */
            --bg:      oklch(97% 0.018 70);
            --surface: oklch(99% 0.008 70);
            --fg:      oklch(22% 0.02 50);
            --muted:   oklch(50% 0.018 50);
            --border:  oklch(90% 0.014 70);
            --accent:  oklch(64% 0.13 28);
            
            /* Extended Tones */
            --accent-soft: oklch(64% 0.13 28 / 0.12);
            --accent-dim:  oklch(64% 0.13 28 / 0.06);
            --white:       oklch(100% 0 0);
            --red-dot:     oklch(60% 0.18 20);
            
            /* Typography */
            --font-display: 'Newsreader', 'Iowan Old Style', Georgia, serif;
            --font-body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
            
            /* Spacing & Radii */
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
            
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-12: 3rem;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Tweak Panel */
        .tweak-panel {
            position: fixed;
            top: var(--space-4);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: var(--space-2) var(--space-4);
            display: flex;
            gap: var(--space-4);
            align-items: center;
            box-shadow: 0 4px 12px oklch(0% 0 0 / 0.05);
            z-index: 1000;
            font-size: 0.8rem;
            color: var(--muted);
            -webkit-app-region: no-drag;
        }

        /* Layout */
        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-4) var(--space-6);
            /* Electron drag region simulation */
            -webkit-app-region: drag;
            user-select: none;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--red-dot);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--red-dot);
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-style: italic;
            color: var(--fg);
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            gap: var(--space-2);
            -webkit-app-region: no-drag;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            display: grid;
            place-items: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--surface);
            color: var(--fg);
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-6) var(--space-6) 120px var(--space-6);
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: var(--radius-full);
            border: 2px solid var(--bg);
        }

        /* Empty State */
        .empty-state {
            margin: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        .empty-kibo {
            font-family: var(--font-display);
            font-size: clamp(4rem, 10vw, 6rem);
            font-style: italic;
            font-weight: 300;
            color: var(--border);
            margin: 0;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .empty-prompt {
            color: var(--muted);
            font-size: 1.1rem;
            margin-top: var(--space-4);
            letter-spacing: 0.02em;
        }

        /* Message List */
        .message-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .message-group-kibo {
            align-items: flex-start;
        }

        .message-group-user {
            align-items: flex-end;
        }

        .message-avatar {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: var(--space-1);
            padding: 0 var(--space-2);
        }

        .bubble {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            max-width: 85%;
            font-size: 1.05rem;
            line-height: 1.5;
            box-shadow: 0 2px 8px oklch(0% 0 0 / 0.02);
        }

        .bubble-kibo {
            background: var(--accent-dim);
            color: var(--fg);
            border: 1px solid var(--accent-soft);
            border-bottom-left-radius: 6px;
        }

        .bubble-user {
            background: var(--white);
            color: var(--fg);
            border: 1px solid var(--border);
            border-bottom-right-radius: 6px;
        }

        /* Input Container */
        .input-anchor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: var(--space-6);
            display: flex;
            justify-content: center;
            /* Gradient fade to transition smoothly into the background */
            background: linear-gradient(0deg, var(--bg) 60%, transparent);
            pointer-events: none;
        }

        .input-wrapper {
            background: var(--white);
            border-radius: var(--radius-full);
            box-shadow: 0 8px 32px oklch(0% 0 0 / 0.06), 0 2px 8px oklch(0% 0 0 / 0.03);
            padding: var(--space-2) var(--space-2) var(--space-2) var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            width: 100%;
            max-width: 760px;
            pointer-events: auto;
            border: 1px solid var(--border);
            transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
        }

        .input-wrapper:focus-within {
            box-shadow: 0 12px 48px oklch(0% 0 0 / 0.08), 0 0 0 4px var(--accent-dim);
            border-color: var(--accent-soft);
            transform: translateY(-2px);
        }

        .text-input {
            border: none;
            background: transparent;
            flex: 1;
            font-family: var(--font-body);
            font-size: 1.1rem;
            color: var(--fg);
            outline: none;
        }

        .text-input::placeholder {
            color: var(--muted);
            opacity: 0.7;
        }

        .mic-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mic-btn:hover {
            color: var(--fg);
            background: var(--bg);
        }

        .send-btn {
            background: var(--accent);
            color: var(--white);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 12px var(--accent-soft);
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(1.05);
            box-shadow: 0 6px 16px var(--accent-soft);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--surface);
            color: var(--muted);
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid var(--border);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; filter: blur(4px); }
            to { opacity: 1; filter: blur(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // Icons
        const SettingsIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );

        const CloseIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );

        const MicIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        );

        const ArrowUpIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
        );

        const BotIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        );

        // Main App Component
        const App = () => {
            const [messages, setMessages] = React.useState([]);
            const [input, setInput] = React.useState('');
            const [isConnecting, setIsConnecting] = React.useState(false);
            const scrollRef = React.useRef(null);

            const scrollToBottom = () => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            };

            React.useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const handleSend = (e) => {
                e?.preventDefault();
                if (!input.trim() || isConnecting) return;

                // Add User Message
                const newMsg = { id: Date.now(), text: input.trim(), sender: 'user' };
                setMessages(prev => [...prev, newMsg]);
                setInput('');
                setIsConnecting(true);

                // Simulate KIBO response
                setTimeout(() => {
                    const responses = [
                        "I've updated my internal memory dashboard with your notes.",
                        "That's a great idea! Let's explore that design direction.",
                        "I am currently tracking your hotkeys and optimizing the AI thread.",
                        "Woof! (Just kidding, I'm a highly sophisticated desktop companion.)"
                    ];
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    
                    setMessages(prev => [...prev, { 
                        id: Date.now() + 1, 
                        text: randomResponse, 
                        sender: 'kibo' 
                    }]);
                    setIsConnecting(false);
                }, 1200);
            };

            const clearChat = () => setMessages([]);

            return (
                <React.Fragment>
                    {/* Floating Dev Tweak Panel */}
                    <div className="tweak-panel">
                        <strong>Prototype Knobs:</strong>
                        <button onClick={clearChat} style={{background: 'transparent', border: '1px solid var(--border)', borderRadius: '4px', cursor: 'pointer', color: 'var(--fg)', padding: '2px 8px'}}>Reset to Empty</button>
                    </div>

                    {/* Draggable Window Header */}
                    <header className="header">
                        <div className="header-brand">
                            <div className="status-dot" title="Connected"></div>
                            <span className="header-title">KIBO</span>
                        </div>
                        <div className="header-actions">
                            <button className="icon-btn" aria-label="Settings"><SettingsIcon /></button>
                            <button className="icon-btn" aria-label="Close"><CloseIcon /></button>
                        </div>
                    </header>

                    {/* Scrollable Chat Canvas */}
                    <main className="chat-area" ref={scrollRef}>
                        {messages.length === 0 ? (
                            <div className="empty-state">
                                <h1 className="empty-kibo">KIBO</h1>
                                <p className="empty-prompt">ask anything</p>
                            </div>
                        ) : (
                            <div className="message-list">
                                {messages.map((msg, index) => {
                                    const isKibo = msg.sender === 'kibo';
                                    const showAvatar = isKibo && (index === 0 || messages[index - 1].sender !== 'kibo');

                                    return (
                                        <div key={msg.id} className={`message-group ${isKibo ? 'message-group-kibo' : 'message-group-user'}`}>
                                            {showAvatar && (
                                                <div className="message-avatar">
                                                    <BotIcon /> KIBO
                                                </div>
                                            )}
                                            <div className={`bubble ${isKibo ? 'bubble-kibo' : 'bubble-user'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Floating Input Pill */}
                    <div className="input-anchor">
                        <form className="input-wrapper" onSubmit={handleSend}>
                            <input 
                                type="text" 
                                className="text-input" 
                                placeholder={isConnecting ? "KIBO is thinking..." : "Ask anything..."} 
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                disabled={isConnecting}
                                autoFocus
                            />
                            <button type="button" className="mic-btn" aria-label="Voice Input">
                                <MicIcon />
                            </button>
                            <button type="submit" className="send-btn" disabled={!input.trim() || isConnecting} aria-label="Send Message">
                                <ArrowUpIcon />
                            </button>
                        </form>
                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
